name: continuous

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - master
      - 'release/*'

jobs:
  windows-latest:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
      - name: Run './build.cmd Verify Cover Pack'
        run: ./build.cmd Verify Cover Pack --no-logo
        env:
          GitHubToken: ${{ secrets.GITHUB_TOKEN }}
